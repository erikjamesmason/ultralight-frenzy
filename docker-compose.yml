services:
  # ── ChromaDB vector store ─────────────────────────────────────────────────
  chroma:
    image: chromadb/chroma:latest
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "8001:8000"   # expose on host for direct inspection if needed

  # ── Gear API + CLI ────────────────────────────────────────────────────────
  gear:
    build: .
    ports:
      - "8000:8000"
    environment:
      # Tells db/client.py to use HttpClient instead of PersistentClient
      CHROMA_HOST: chroma
      CHROMA_PORT: "8000"
    env_file:
      - .env          # ANTHROPIC_API_KEY and any overrides
    depends_on:
      - chroma

volumes:
  chroma_data:
